name: Daily inbox cleanup

on:
  schedule:
    # 11:30 UTC = 5:30am America/Denver during MDT (daylight saving).
    # Note: GitHub cron is UTC-only (no DST), so in winter (MST) this fires 4:30am.
    - cron: "30 11 * * *"
  workflow_dispatch:        # lets you run it on demand from the Actions tab
    inputs:
      dry_run:
        description: "Dry run (no changes)? Checked = preview only."
        type: boolean
        default: true

concurrency: gardener-daily  # never overlap two runs

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Write Gmail secrets
        run: |
          printf '%s' '${{ secrets.GMAIL_CREDENTIALS }}' > credentials.json
          printf '%s' '${{ secrets.GMAIL_TOKEN }}' > token.json
      - name: Run daily cleanup
        env:
          # Live by default; set repo variable GARDENER_DRY_RUN=true to preview only.
          # The manual-dispatch checkbox overrides when you run it by hand.
          GARDENER_DRY_RUN: ${{ inputs.dry_run && 'true' || vars.GARDENER_DRY_RUN || 'false' }}
        run: python run_daily.py
      - name: Scrub secrets
        if: always()
        run: rm -f credentials.json token.json
